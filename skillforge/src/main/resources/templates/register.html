<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillForge — Inscription</title>
  <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body class="form-page">

<nav>
  <div class="logo">Skill<span>Forge</span></div>
  <div class="nav-links">
    <a th:href="@{/login}" class="nav-link">Se connecter</a>
  </div>
</nav>

<div class="form-container">
  <div class="nm-raised form-card">
    <p class="form-eyebrow">Nouveau compte</p>
    <h1 class="form-title">Créer un <em>profil</em></h1>

    <div th:if="${error}"
         style="background:#fdecea;color:#c0392b;border-radius:10px;padding:0.75rem 1rem;font-size:13px;margin-bottom:1.5rem;">
      <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="username">Nom d'utilisateur</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="ex : hugo_dev" required autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="vous@exemple.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="8 caractères minimum" required minlength="8"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirmer le mot de passe</label>
        <input class="form-input" type="password" id="confirm" name="confirm"
               placeholder="••••••••" required minlength="8"/>
      </div>

      <div class="form-actions">
        <a th:href="@{/login}"><button type="button" class="btn-cancel">Annuler</button></a>
        <button type="submit" class="btn-submit">Créer mon compte</button>
      </div>

    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text-4);">
      Déjà un compte ?
      <a th:href="@{/login}" style="color:var(--accent);font-weight:500;">Se connecter</a>
    </p>
  </div>
</div>

</body>
</html>
