<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillForge</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<h1>My Skills</h1>

<a href="/add">Add Skill</a>
<a href="/test-db">Test BDD</a>

<div class="grid">
    <div class="card" th:each="skill : ${skills}">
        <h2 th:text="${skill.name}"></h2>
        <p th:text="${skill.category}"></p>
        <div>
            <span th:each="i : ${#numbers.sequence(1, skill.level)}">⭐</span>
        </div>
    </div>
</div>

</body>
</html>
