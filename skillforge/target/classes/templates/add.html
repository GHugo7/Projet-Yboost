<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Skill</title>
</head>
<body>

<h1>Add Skill</h1>

<form th:action="@{/add}" method="post" th:object="${skill}">
    <input type="text" th:field="*{name}" placeholder="Skill name" required>
    <input type="text" th:field="*{category}" placeholder="Category" required>
    <input type="number" th:field="*{level}" min="1" max="5" required>
    <button type="submit">Save</button>
</form>

</body>
</html>
